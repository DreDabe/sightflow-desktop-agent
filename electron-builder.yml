appId: com.autoreply.desktop
productName: AutoReply - 智能回复助手
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,README.zh-CN.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!.editorconfig'
  - '!docs/**'
  - '!scripts/**'
  - '!skills/**'
  - '!sentpredict/predict.py'
  - '!sentpredict/models/**'
asarUnpack:
  - resources/**
win:
  executableName: AutoReply
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
